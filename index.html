<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiba Docs — Assistant Santé Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        tiba: {
                            green: '#0B8E71',
                            sand: '#F5F0E6',
                            coral: '#E85D75',
                            dark: '#1A1A1A'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 font-sans antialiased transition-colors duration-200 flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col items-stretch shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-slate-200 dark:border-slate-700 shrink-0">
            <h1 class="text-xl font-display font-bold text-tiba-green dark:text-teal-400">Tiba Docs</h1>
        </div>
        
        <nav class="flex-1 overflow-y-auto w-full py-4 px-3 space-y-1" id="nav-container">
            <!-- Dynamically populated links -->
        </nav>
        
        <div class="p-4 border-t border-slate-200 dark:border-slate-700 shrink-0">
            <button id="theme-toggle" class="w-full flex items-center justify-center space-x-2 px-4 py-2 rounded-lg bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors text-sm font-medium">
                <span id="theme-icon">🌙</span>
                <span id="theme-text">Mode Sombre</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full bg-slate-50 dark:bg-slate-900 overflow-hidden relative">
        <header class="h-16 bg-white/80 dark:bg-slate-800/80 backdrop-blur border-b border-slate-200 dark:border-slate-700 flex items-center px-8 shrink-0 sticky top-0 z-10 shadow-sm">
            <h2 id="page-title" class="text-lg font-display font-semibold text-slate-800 dark:text-white">Accueil</h2>
        </header>

        <div class="flex-1 overflow-y-auto">
            <div class="max-w-4xl mx-auto px-8 py-10 pb-32">
                <div id="content" class="prose prose-slate dark:prose-invert prose-headings:font-display prose-a:text-tiba-green hover:prose-a:text-tiba-green/80 max-w-none">
                    <div class="text-center py-20">
                        <div class="w-20 h-20 border-4 border-tiba-green border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
                        <p class="text-lg text-slate-500">Chargement des documents...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
